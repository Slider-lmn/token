<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hiragana — Reader</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,400;1,9..144,500&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&family=Noto+Serif+JP:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--ink);
    font-family: 'Fraunces', Georgia, serif;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    transition: background-color .45s ease, color .45s ease;
    min-height: 100vh;
  }

  /* THEMES */
  [data-theme="warm"] {
    --bg: #0c0a07;
    --surface: #15110c;
    --surface-2: #1c1812;
    --ink: #e8dec5;
    --ink-soft: #b8ad94;
    --ink-muted: #877a60;
    --ink-faint: #58503e;
    --rule: #2a2418;
    --rule-strong: #3a3224;
    --correct: #9bb88a;
    --correct-soft: rgba(155,184,138,.14);
    --wrong: #c79688;
    --accent: #d4a574;
    --shadow: 0 20px 60px rgba(0,0,0,.4);
  }
  [data-theme="cool"] {
    --bg: #0a0c11;
    --surface: #14171e;
    --surface-2: #1c2029;
    --ink: #e0e5ee;
    --ink-soft: #aeb4c0;
    --ink-muted: #6b7280;
    --ink-faint: #444a52;
    --rule: #1c2028;
    --rule-strong: #2a2f3a;
    --correct: #86c5a6;
    --correct-soft: rgba(134,197,166,.14);
    --wrong: #d68585;
    --accent: #a4b8e0;
    --shadow: 0 20px 60px rgba(0,0,0,.5);
  }
  [data-theme="paper"] {
    --bg: #f3ede0;
    --surface: #fbf7ed;
    --surface-2: #f6f0e0;
    --ink: #2a241d;
    --ink-soft: #5c5042;
    --ink-muted: #786c5b;
    --ink-faint: #a89c87;
    --rule: #d8ceb5;
    --rule-strong: #b8ad94;
    --correct: #436b3d;
    --correct-soft: rgba(67,107,61,.10);
    --wrong: #8b3a2b;
    --accent: #8b5e25;
    --shadow: 0 20px 50px rgba(80,60,30,.15);
  }

  /* TYPOGRAPHY */
  .jp    { font-family: 'Noto Serif JP', serif; font-feature-settings: "palt" 1; }
  .mono  { font-family: 'JetBrains Mono', monospace; }
  .serif { font-family: 'Fraunces', serif; }
  .sans  { font-family: 'Inter', system-ui, sans-serif; }

  /* SIZE / SPACING TOKENS (mutate via data-* on .reader) */
  .reader[data-size="s"]  { --hira-size: 1.125rem; --hira-leading: 1.85; }
  .reader[data-size="m"]  { --hira-size: 1.375rem; --hira-leading: 1.9; }
  .reader[data-size="l"]  { --hira-size: 1.75rem;  --hira-leading: 1.95; }
  .reader[data-size="xl"] { --hira-size: 2.125rem; --hira-leading: 2.0; }

  .reader[data-spacing="compact"]     { --verse-gap: 1rem;    }
  .reader[data-spacing="comfortable"] { --verse-gap: 1.875rem; }
  .reader[data-spacing="spacious"]    { --verse-gap: 3rem;    }

  /* PROGRESS BAR */
  .progress-track {
    position: fixed; inset: 0 0 auto 0; height: 2px;
    background: transparent; z-index: 30; pointer-events: none;
  }
  .progress-fill {
    height: 100%; background: var(--accent);
    transition: width .6s cubic-bezier(.22,1,.36,1);
    opacity: .85;
  }

  /* MASTHEAD */
  .masthead {
    text-align: center;
    padding: 1rem clamp(1rem, 4vw, 2.5rem) 1.25rem;
    position: relative;
  }
  .masthead-eyebrow {
    font-family: 'Fraunces', serif; font-style: italic;
    font-size: .72rem; color: var(--ink-muted);
    letter-spacing: .32em; text-transform: uppercase;
    margin: 0 0 1.25rem;
  }
  .masthead-title {
    font-family: 'Noto Serif JP', serif;
    font-weight: 500;
    font-size: clamp(3rem, 9vw, 4.75rem);
    letter-spacing: .08em;
    margin: 0; color: var(--ink);
    line-height: 1;
  }
  .masthead-rule {
    width: 3rem; height: 1px;
    background: var(--rule-strong);
    margin: 1.4rem auto;
  }
  .masthead-subtitle {
    font-family: 'Fraunces', serif; font-style: italic;
    font-size: 1rem; color: var(--ink-muted);
    letter-spacing: .03em; margin: 0;
  }
  .masthead-meta {
    margin-top: .75rem;
    font-family: 'Fraunces', serif; font-style: italic;
    font-size: .72rem; color: var(--ink-faint);
    letter-spacing: .22em; text-transform: uppercase;
  }

  /* TOOLSTRIP (sticky nav under masthead) */
  .toolstrip {
    position: sticky; top: 0; z-index: 20;
    background: color-mix(in srgb, var(--bg) 88%, transparent);
    backdrop-filter: blur(14px) saturate(120%);
    -webkit-backdrop-filter: blur(14px) saturate(120%);
    border-top: 1px solid var(--rule);
    border-bottom: 1px solid var(--rule);
    padding: .65rem clamp(1rem, 4vw, 2.5rem);
    display: flex; align-items: center; justify-content: space-between;
    gap: 1rem;
  }

  .nav-pills {
    display: flex;
    gap: .4rem;
    align-items: center;
    flex-wrap: wrap;
  }

  .pill-wrap { position: relative; }

  .nav-pill-btn {
    background: none;
    border: 1px solid var(--rule);
    border-radius: 10px;
    padding: .42rem .85rem;
    color: var(--ink-soft);
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    gap: .5rem;
    transition: border-color .2s ease, color .2s ease, background .2s ease, transform .15s ease;
    font-family: 'Inter', sans-serif;
    line-height: 1;
  }
  .nav-pill-btn:hover {
    border-color: var(--rule-strong);
    color: var(--ink);
    background: var(--surface-2);
  }
  .nav-pill-btn.active {
    border-color: var(--accent);
    color: var(--accent);
    background: color-mix(in srgb, var(--accent) 9%, transparent);
  }
  .nav-pill-btn .pill-jp {
    font-family: 'Noto Serif JP', serif;
    font-size: .98rem;
    font-weight: 500;
    letter-spacing: .04em;
  }
  .nav-pill-btn .pill-fr {
    font-family: 'Fraunces', serif;
    font-style: italic;
    font-size: .68rem;
    letter-spacing: .22em;
    text-transform: uppercase;
    color: var(--ink-muted);
    transition: color .2s ease;
  }
  .nav-pill-btn:hover .pill-fr { color: var(--ink-soft); }
  .nav-pill-btn.active .pill-fr {
    color: color-mix(in srgb, var(--accent) 70%, var(--ink-muted));
  }
  .nav-pill-btn .caret {
    color: var(--ink-faint);
    font-size: .6rem;
    transition: transform .2s ease, color .2s ease;
  }
  .nav-pill-btn:hover .caret { color: var(--ink-muted); }
  .nav-pill-btn.open .caret { transform: rotate(180deg); color: var(--accent); }

  .nav-pill-btn.quiz-pill {
    border-style: dashed;
  }
  .nav-pill-btn.quiz-pill:hover {
    border-style: solid;
    border-color: var(--accent);
    color: var(--accent);
    background: color-mix(in srgb, var(--accent) 6%, transparent);
  }
  .nav-pill-btn.quiz-pill.active {
    border-style: solid;
  }

  .pill-divider {
    width: 1px;
    height: 22px;
    background: var(--rule);
    margin: 0 .2rem;
    flex-shrink: 0;
  }

  .chapter-menu {
    position: absolute; top: calc(100% + 10px); left: 0;
    background: var(--surface); border: 1px solid var(--rule);
    border-radius: 14px; padding: .5rem;
    min-width: 300px; max-width: min(360px, calc(100vw - 2rem));
    box-shadow: var(--shadow); z-index: 25;
    animation: dropIn .2s cubic-bezier(.22,1,.36,1);
  }
  .chapter-menu.align-right { left: auto; right: 0; }
  @keyframes dropIn { from {opacity:0; transform: translateY(-4px);} to {opacity:1; transform: translateY(0);} }

  .menu-item {
    display: flex; gap: .75rem; width: 100%;
    text-align: left; background: none; border: none;
    padding: .7rem .9rem;
    font-family: 'Noto Serif JP', serif; font-size: .95rem;
    color: var(--ink); cursor: pointer;
    border-radius: 9px; transition: background .15s;
  }
  .menu-item:hover { background: var(--surface-2); }
  .menu-item.active { background: color-mix(in srgb, var(--accent) 14%, transparent); color: var(--accent); }
  .menu-item .num {
    font-family: 'Fraunces', serif; font-style: italic;
    color: var(--ink-muted); font-size: .8rem;
    min-width: 1.6em; padding-top: 2px;
    letter-spacing: .08em;
  }
  .menu-item .titles { display: flex; flex-direction: column; gap: 2px; }
  .menu-item .titles .fr {
    font-family: 'Fraunces', serif; font-style: italic;
    font-size: .8rem; color: var(--ink-muted);
  }
  .menu-section + .menu-section {
    margin-top: .25rem;
    padding-top: .5rem;
    border-top: 1px solid var(--rule);
  }
  .menu-section-label {
    font-family: 'Fraunces', serif; font-style: italic;
    font-size: .65rem; color: var(--ink-muted);
    letter-spacing: .28em; text-transform: uppercase;
    padding: .5rem .9rem .35rem;
    display: flex; align-items: center; gap: .5rem;
  }
  .menu-section-label .ml-jp {
    font-family: 'Noto Serif JP', serif;
    font-style: normal;
    font-size: .8rem;
    letter-spacing: .05em;
    color: var(--ink-soft);
  }

  .icon-btn {
    background: none; border: 1px solid var(--rule);
    border-radius: 9px; width: 38px; height: 38px;
    display: inline-flex; align-items: center; justify-content: center;
    cursor: pointer; color: var(--ink-soft);
    transition: border-color .2s, color .2s, background .2s;
  }
  .icon-btn:hover { border-color: var(--rule-strong); color: var(--ink); background: var(--surface-2); }
  .icon-btn svg { width: 16px; height: 16px; }

  /* LANGUAGE SWITCHER */
  .toolstrip-right {
    display: flex; align-items: center; gap: .4rem;
  }
  .lang-wrap { position: relative; }
  .lang-btn {
    width: auto;
    padding: 0 .55rem 0 .5rem;
    height: 38px;
    gap: .35rem;
    background: none; border: 1px solid var(--rule);
    border-radius: 9px;
    display: inline-flex; align-items: center;
    cursor: pointer; color: var(--ink-soft);
    transition: border-color .2s ease, color .2s ease, background .2s ease;
  }
  .lang-btn:hover { border-color: var(--rule-strong); color: var(--ink); background: var(--surface-2); }
  .lang-btn.open { border-color: var(--accent); color: var(--accent); }
  .lang-btn svg { width: 16px; height: 16px; }
  .lang-code {
    font-family: 'Fraunces', serif; font-style: italic;
    font-size: .7rem; letter-spacing: .18em;
    text-transform: uppercase;
    color: inherit;
    line-height: 1;
  }
  .lang-menu {
    position: absolute;
    top: calc(100% + 8px);
    right: 0;
    background: var(--surface);
    border: 1px solid var(--rule);
    border-radius: 12px;
    padding: .4rem;
    min-width: 160px;
    box-shadow: var(--shadow);
    z-index: 25;
    animation: dropIn .2s cubic-bezier(.22,1,.36,1);
  }
  .lang-option {
    display: flex; align-items: center; justify-content: space-between;
    gap: .8rem;
    width: 100%;
    background: none;
    border: none;
    padding: .55rem .8rem;
    font-family: 'Fraunces', serif;
    font-size: .9rem;
    color: var(--ink);
    cursor: pointer;
    border-radius: 8px;
    text-align: left;
    transition: background .15s ease, color .15s ease;
  }
  .lang-option:hover { background: var(--surface-2); }
  .lang-option.active {
    background: color-mix(in srgb, var(--accent) 13%, transparent);
    color: var(--accent);
  }
  .lang-option .lang-flag {
    font-family: 'JetBrains Mono', monospace;
    font-size: .65rem;
    letter-spacing: .12em;
    color: var(--ink-faint);
  }
  .lang-option.active .lang-flag { color: var(--accent); }

  /* READER LAYOUT */
  .reader {
    max-width: 42rem;
    margin: 0 auto;
    padding: clamp(2.5rem, 8vh, 6rem) clamp(1.25rem, 5vw, 3rem) 6rem;
  }

  .chapter-head {
    text-align: center;
    margin-bottom: clamp(2rem, 6vh, 4rem);
    padding-bottom: 2.25rem;
    border-bottom: 1px solid var(--rule);
  }
  .chapter-eyebrow {
    font-family: 'Fraunces', serif; font-style: italic;
    font-size: .75rem; color: var(--ink-muted);
    letter-spacing: .25em; text-transform: uppercase;
    margin-bottom: 1.25rem;
  }
  .chapter-title {
    font-family: 'Noto Serif JP', serif;
    font-size: clamp(1.9rem, 5vw, 2.85rem);
    font-weight: 500; letter-spacing: .04em;
    color: var(--ink); margin: 0; line-height: 1.35;
  }
  .chapter-subtitle {
    font-family: 'Fraunces', serif; font-style: italic;
    font-size: 1.1rem; color: var(--ink-muted);
    margin: .9rem 0 0;
  }

  /* VERSE */
  .verses { display: flex; flex-direction: column; }

  .verse {
    position: relative;
    padding-left: 3rem;
    margin-bottom: var(--verse-gap);
    animation: verseEnter .55s cubic-bezier(.22,1,.36,1) both;
  }
  @keyframes verseEnter {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .verse-num {
    position: absolute; left: 0; top: .35em;
    font-family: 'JetBrains Mono', monospace;
    font-variant-numeric: tabular-nums;
    font-size: .68rem; color: var(--ink-faint);
    letter-spacing: .08em;
    transition: color .35s ease;
  }
  .verse.complete .verse-num { color: var(--correct); }
  .verse.active::before {
    content: '';
    position: absolute; left: 1.5rem; top: .5em;
    width: 4px; height: 4px; border-radius: 50%;
    background: var(--accent);
    animation: pulseDot 1.8s ease-in-out infinite;
  }
  @keyframes pulseDot { 0%, 100% {opacity:.35;} 50% {opacity:1;} }

  .verse-text {
    font-family: 'Noto Serif JP', serif;
    font-size: var(--hira-size);
    line-height: var(--hira-leading);
    color: var(--ink); margin: 0;
    letter-spacing: .025em;
    transition: color .3s ease;
  }
  .verse-text.mono {
    font-family: 'JetBrains Mono', monospace;
    font-size: calc(var(--hira-size) * .82);
    letter-spacing: .01em;
  }
  .verse.readable .verse-text { cursor: pointer; }
  .verse.readable:hover .verse-text { color: var(--accent); }

  .verse-input-row {
    margin-top: .75rem;
    display: flex; align-items: baseline; gap: 1rem;
    flex-wrap: wrap;
  }
  .prose-input {
    flex: 1; min-width: 200px;
    background: transparent; border: none;
    border-bottom: 1px dashed var(--rule-strong);
    padding: .55rem 0;
    font-family: 'JetBrains Mono', monospace;
    font-size: .95rem;
    color: var(--ink);
    outline: none; caret-color: var(--accent);
    letter-spacing: .015em;
    transition: border-color .25s ease, color .25s ease;
  }
  .prose-input.jp { font-family: 'Noto Serif JP', serif; font-size: 1.15rem; letter-spacing: .02em; }
  .prose-input::placeholder { color: var(--ink-faint); font-style: italic; }
  .prose-input:focus { border-bottom-style: solid; border-bottom-color: var(--accent); }
  .prose-input.wrong { border-bottom-color: var(--wrong); color: var(--wrong); }
  .prose-input.correct {
    border-bottom-style: solid;
    border-bottom-color: var(--correct);
    color: var(--correct);
    opacity: .9;
    cursor: default;
  }
  .prose-input.correct:focus { border-bottom-color: var(--correct); }

  .reveal-link {
    background: none; border: none; padding: 0;
    font-family: 'Fraunces', serif; font-style: italic;
    font-size: .82rem; color: var(--ink-muted);
    cursor: pointer; white-space: nowrap;
    transition: color .2s;
  }
  .reveal-link:hover { color: var(--accent); }
  .reveal-link::before { content: '— '; opacity: .5; }

  .revealed-answer {
    flex-basis: 100%;
    padding: .5rem .75rem;
    border-left: 2px solid var(--accent);
    background: color-mix(in srgb, var(--accent) 8%, transparent);
    border-radius: 0 6px 6px 0;
    font-family: 'JetBrains Mono', monospace;
    font-size: .9rem; color: var(--ink-soft);
    margin-top: .25rem;
    animation: slideIn .3s ease;
  }
  .revealed-answer.jp { font-family: 'Noto Serif JP', serif; font-size: 1.05rem; }
  @keyframes slideIn { from {opacity:0; transform: translateY(-4px);} to {opacity:1;} }

  .verse-annotation {
    margin-top: .55rem;
    animation: annotateIn .5s cubic-bezier(.22,1,.36,1) both;
  }
  @keyframes annotateIn {
    from { opacity: 0; transform: translateY(-3px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .annotation-romaji {
    font-family: 'JetBrains Mono', monospace;
    font-size: .85rem; color: var(--correct);
    margin: 0; letter-spacing: .02em;
  }
  .annotation-romaji.jp {
    font-family: 'Noto Serif JP', serif;
    font-size: 1.05rem;
    color: var(--correct);
  }
  .annotation-french {
    font-family: 'Fraunces', serif; font-style: italic;
    font-size: .9rem; color: var(--ink-muted);
    margin: .3rem 0 0; line-height: 1.55;
  }

  /* CHAPTER FOOTER */
  .chapter-foot {
    margin-top: clamp(3rem, 8vh, 5rem);
    padding-top: 2rem;
    text-align: center;
  }
  .ornament {
    font-family: 'Fraunces', serif;
    color: var(--ink-muted);
    letter-spacing: .8em;
    margin-bottom: 1.5rem;
    font-size: .9rem;
    padding-left: .8em;
  }
  .end-label {
    font-family: 'Fraunces', serif; font-style: italic;
    font-size: .8rem; color: var(--ink-muted);
    letter-spacing: .2em; text-transform: uppercase;
    margin-bottom: 1.5rem;
  }
  .chapter-nav {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1rem;
    margin-top: 1.5rem;
    align-items: stretch;
  }
  .nav-cell { display: flex; }
  .nav-cell.left  { justify-content: flex-start; }
  .nav-cell.right { justify-content: flex-end; }

  .nav-pill {
    display: inline-flex; align-items: center; gap: .9rem;
    background: none;
    border: 1px solid var(--rule);
    border-radius: 14px;
    padding: .7rem 1.15rem;
    color: var(--ink);
    cursor: pointer;
    transition: border-color .25s, color .25s, transform .2s, background .25s;
    max-width: 100%;
    text-align: left;
  }
  .nav-pill:hover {
    border-color: var(--accent); color: var(--accent);
    background: color-mix(in srgb, var(--accent) 7%, transparent);
  }
  .nav-pill.prev:hover { transform: translateX(-3px); }
  .nav-pill.next:hover { transform: translateX(3px); }
  .nav-pill .nav-arrow {
    font-family: 'Fraunces', serif; font-size: 1.2rem;
    color: var(--ink-muted); line-height: 1;
    transition: color .25s;
  }
  .nav-pill:hover .nav-arrow { color: var(--accent); }
  .nav-pill .nav-text { display: flex; flex-direction: column; gap: 2px; min-width: 0; }
  .nav-pill .nav-text.right { align-items: flex-end; }
  .nav-pill .nav-label {
    font-family: 'Fraunces', serif; font-style: italic;
    font-size: .7rem; color: var(--ink-muted);
    letter-spacing: .2em; text-transform: uppercase;
    transition: color .25s;
  }
  .nav-pill:hover .nav-label { color: color-mix(in srgb, var(--accent) 70%, var(--ink-muted)); }
  .nav-pill .nav-title {
    font-family: 'Noto Serif JP', serif;
    font-size: .95rem;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 18ch;
  }

  @media (max-width: 540px) {
    .chapter-nav { grid-template-columns: 1fr; }
    .nav-cell.left, .nav-cell.right { justify-content: stretch; }
    .nav-pill { width: 100%; justify-content: center; }
  }

  /* CELEBRATION */
  .celebration {
    text-align: center;
    padding: 1.5rem;
    margin: 2rem 0 1.5rem;
    border: 1px solid var(--correct);
    border-radius: 14px;
    background: var(--correct-soft);
    animation: bloom .6s cubic-bezier(.22,1,.36,1);
  }
  @keyframes bloom { from {opacity:0; transform: scale(.96);} to {opacity:1; transform: scale(1);} }
  .celebration .badge {
    font-family: 'Noto Serif JP', serif;
    font-size: 1.4rem; color: var(--correct); margin: 0;
  }
  .celebration .sub {
    font-family: 'Fraunces', serif; font-style: italic;
    color: var(--ink-muted); margin: .35rem 0 0; font-size: .9rem;
  }

  /* SETTINGS PANEL */
  .scrim {
    position: fixed; inset: 0;
    background: color-mix(in srgb, var(--bg) 30%, black 70%);
    opacity: 0; visibility: hidden;
    transition: opacity .25s ease, visibility .25s ease;
    z-index: 40;
  }
  .scrim.visible { opacity: .5; visibility: visible; }

  .panel {
    position: fixed; top: 0; right: 0; bottom: 0;
    width: min(420px, 100vw);
    background: var(--surface);
    border-left: 1px solid var(--rule);
    padding: 1.75rem;
    overflow-y: auto;
    transform: translateX(100%);
    transition: transform .35s cubic-bezier(.22,1,.36,1);
    z-index: 50;
    box-shadow: var(--shadow);
  }
  .panel.open { transform: translateX(0); }

  .panel-head {
    display: flex; align-items: baseline;
    justify-content: space-between;
    margin-bottom: 1.75rem;
  }
  .panel-head h3 {
    font-family: 'Fraunces', serif;
    font-size: 1.55rem; font-weight: 500;
    margin: 0; color: var(--ink);
  }
  .panel-close {
    background: none; border: none;
    width: 32px; height: 32px;
    font-size: 1.4rem; color: var(--ink-muted);
    cursor: pointer; padding: 0;
    border-radius: 8px;
    transition: background .2s, color .2s;
  }
  .panel-close:hover { background: var(--surface-2); color: var(--ink); }

  .panel-section { margin-bottom: 1.75rem; }
  .panel-section h4 {
    font-family: 'Fraunces', serif; font-style: italic;
    font-size: .7rem; font-weight: 500;
    text-transform: uppercase; letter-spacing: .2em;
    color: var(--ink-muted);
    margin: 0 0 1rem;
  }

  .row {
    display: flex; align-items: center;
    justify-content: space-between; gap: 1rem;
    margin-bottom: .75rem;
    min-height: 32px;
  }
  .row > .row-label {
    font-family: 'Inter', sans-serif; font-size: .87rem;
    color: var(--ink-soft); flex: 1;
  }

  .segments {
    display: inline-flex;
    background: color-mix(in srgb, var(--ink) 5%, transparent);
    border-radius: 9px; padding: 3px; gap: 2px;
  }
  .seg {
    background: transparent; border: none;
    padding: .35rem .65rem;
    font-family: 'Inter', sans-serif;
    font-size: .78rem; color: var(--ink-muted);
    cursor: pointer; border-radius: 7px;
    transition: all .18s ease; min-width: 32px;
  }
  .seg:hover { color: var(--ink); }
  .seg.active {
    background: var(--bg); color: var(--ink);
    box-shadow: 0 1px 2px rgba(0,0,0,.12);
  }
  [data-theme="paper"] .seg.active { background: white; }

  .switch {
    width: 36px; height: 20px;
    background: color-mix(in srgb, var(--ink) 15%, transparent);
    border: none; border-radius: 11px; padding: 2px;
    cursor: pointer; position: relative;
    transition: background .2s;
  }
  .switch.on { background: var(--accent); }
  .switch-knob {
    display: block; width: 16px; height: 16px;
    background: var(--bg);
    border-radius: 50%;
    transition: transform .22s cubic-bezier(.22,1,.36,1);
  }
  .switch.on .switch-knob { transform: translateX(16px); }
  [data-theme="paper"] .switch-knob { background: white; }

  .reset-btn {
    margin-top: 1rem;
    width: 100%; padding: .7rem 1rem;
    background: none; border: 1px solid var(--rule);
    border-radius: 9px;
    font-family: 'Inter', sans-serif;
    font-size: .85rem; color: var(--ink-soft);
    cursor: pointer;
    transition: border-color .2s, color .2s, background .2s;
  }
  .reset-btn:hover { border-color: var(--wrong); color: var(--wrong); }

  /* KEYBOARD HINT */
  kbd {
    font-family: 'JetBrains Mono', monospace;
    font-size: .7rem;
    padding: .1rem .4rem;
    background: var(--surface-2);
    border: 1px solid var(--rule);
    border-radius: 4px;
    color: var(--ink-soft);
  }

  /* SCROLLBAR */
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--rule); border-radius: 5px; border: 2px solid var(--bg); }
  ::-webkit-scrollbar-thumb:hover { background: var(--rule-strong); }

  /* ACCESSIBILITY */
  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      animation-duration: .01ms !important;
      transition-duration: .01ms !important;
    }
  }

  /* ============================================
     QUIZ MODE
  ============================================ */
  .quiz-stage {
    max-width: 44rem;
    margin: 0 auto;
    padding: clamp(2rem, 6vh, 4rem) clamp(1.25rem, 5vw, 3rem) 6rem;
    animation: verseEnter .55s cubic-bezier(.22,1,.36,1) both;
  }

  .quiz-eyebrow {
    text-align: center;
    font-family: 'Fraunces', serif; font-style: italic;
    font-size: .72rem; color: var(--ink-muted);
    letter-spacing: .32em; text-transform: uppercase;
    margin: 0 0 1.25rem;
  }
  .quiz-title {
    text-align: center;
    font-family: 'Noto Serif JP', serif;
    font-size: clamp(1.7rem, 4.5vw, 2.4rem);
    font-weight: 500; letter-spacing: .06em;
    color: var(--ink); margin: 0 0 .75rem;
  }
  .quiz-subtitle {
    text-align: center;
    font-family: 'Fraunces', serif; font-style: italic;
    font-size: 1rem; color: var(--ink-muted);
    margin: 0 0 2.5rem;
  }

  .quiz-card {
    position: relative;
    text-align: center;
    padding: clamp(2rem, 6vw, 3.5rem) clamp(1.5rem, 5vw, 2.5rem);
    margin-bottom: 2rem;
    border: 1px solid var(--rule);
    border-radius: 18px;
    background: var(--surface);
    box-shadow: var(--shadow);
    overflow: hidden;
  }
  .quiz-card::before {
    content: '';
    position: absolute;
    inset: -1px;
    background: radial-gradient(ellipse at top, color-mix(in srgb, var(--accent) 10%, transparent), transparent 65%);
    pointer-events: none;
  }
  .quiz-card::after {
    content: '';
    position: absolute;
    left: 50%; bottom: 0;
    width: 30%; height: 1px;
    transform: translateX(-50%);
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    opacity: .5;
  }

  .quiz-direction {
    position: relative;
    font-family: 'Fraunces', serif; font-style: italic;
    font-size: .68rem; color: var(--ink-faint);
    letter-spacing: .28em; text-transform: uppercase;
    margin-bottom: 1.75rem;
  }
  .quiz-direction .arrow {
    color: var(--accent);
    font-style: normal;
    margin: 0 .35em;
    opacity: .8;
  }

  .quiz-prompt {
    position: relative;
    line-height: 1;
    margin: 0 0 1.5rem;
    color: var(--ink);
    letter-spacing: .02em;
    animation: quizFlip .4s cubic-bezier(.22,1,.36,1);
  }
  .quiz-prompt.jp {
    font-family: 'Noto Serif JP', serif;
    font-weight: 500;
    font-size: clamp(5rem, 18vw, 9rem);
  }
  .quiz-prompt.mono {
    font-family: 'JetBrains Mono', monospace;
    font-weight: 500;
    font-size: clamp(3.5rem, 12vw, 6rem);
    letter-spacing: .04em;
  }
  @keyframes quizFlip {
    from { opacity: 0; transform: translateY(-8px) scale(.97); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }

  .quiz-question {
    position: relative;
    font-family: 'Fraunces', serif; font-style: italic;
    font-size: .95rem;
    color: var(--ink-muted);
    margin: 0;
  }

  .quiz-choices {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: .9rem;
    margin-bottom: 2rem;
  }

  .quiz-choice {
    position: relative;
    background: var(--surface);
    border: 1px solid var(--rule);
    border-radius: 14px;
    padding: 1.3rem .9rem;
    color: var(--ink);
    cursor: pointer;
    transition: border-color .2s ease, transform .15s ease, background .25s ease, color .25s ease, box-shadow .2s ease;
    text-align: center;
    line-height: 1.1;
  }
  .quiz-choice.mono {
    font-family: 'JetBrains Mono', monospace;
    font-size: 1.5rem; letter-spacing: .03em;
  }
  .quiz-choice.jp {
    font-family: 'Noto Serif JP', serif;
    font-weight: 500;
    font-size: 2.3rem; letter-spacing: .04em;
  }
  .quiz-choice .choice-key {
    position: absolute; top: .55rem; left: .7rem;
    font-family: 'JetBrains Mono', monospace;
    font-size: .65rem; color: var(--ink-faint);
    letter-spacing: .08em;
    transition: color .2s;
  }
  .quiz-choice:hover:not(:disabled) {
    border-color: var(--accent);
    color: var(--accent);
    transform: translateY(-2px);
    box-shadow: 0 6px 18px color-mix(in srgb, var(--accent) 18%, transparent);
  }
  .quiz-choice:hover:not(:disabled) .choice-key { color: var(--accent); }
  .quiz-choice:disabled { cursor: default; }
  .quiz-choice.correct {
    border-color: var(--correct);
    color: var(--correct);
    background: var(--correct-soft);
    animation: pulseGood .55s ease;
  }
  .quiz-choice.wrong {
    border-color: var(--wrong);
    color: var(--wrong);
    background: color-mix(in srgb, var(--wrong) 8%, transparent);
    animation: shakeBad .4s ease;
  }
  .quiz-choice.faded { opacity: .4; }
  @keyframes pulseGood {
    0%   { transform: scale(1); }
    40%  { transform: scale(1.05); }
    100% { transform: scale(1); }
  }
  @keyframes shakeBad {
    0%, 100% { transform: translateX(0); }
    20% { transform: translateX(-5px); }
    50% { transform: translateX(5px); }
    80% { transform: translateX(-3px); }
  }

  .quiz-stats {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 1rem;
    padding: 1.25rem 0;
    border-top: 1px solid var(--rule);
    border-bottom: 1px solid var(--rule);
    margin-bottom: 1.5rem;
  }
  .quiz-stats .stat {
    display: flex; flex-direction: column;
    align-items: center; gap: .3rem;
  }
  .quiz-stats .stat-value {
    font-family: 'Fraunces', serif;
    font-size: 1.5rem;
    color: var(--ink);
    font-variant-numeric: tabular-nums;
    line-height: 1;
    transition: color .25s ease;
  }
  .quiz-stats .stat-value.is-correct { color: var(--correct); }
  .quiz-stats .stat-value.is-wrong   { color: var(--wrong); }
  .quiz-stats .stat-value.is-streak  { color: var(--accent); }
  .quiz-stats .stat-label {
    font-family: 'Fraunces', serif; font-style: italic;
    font-size: .62rem; color: var(--ink-muted);
    letter-spacing: .22em; text-transform: uppercase;
  }

  .quiz-controls {
    display: flex; justify-content: center; gap: .75rem;
    flex-wrap: wrap;
  }
  .quiz-btn {
    background: none; border: 1px solid var(--rule);
    border-radius: 10px;
    padding: .6rem 1.25rem;
    font-family: 'Fraunces', serif; font-style: italic;
    font-size: .85rem; color: var(--ink-soft);
    cursor: pointer;
    transition: border-color .2s, color .2s, background .2s;
  }
  .quiz-btn:hover {
    border-color: var(--accent);
    color: var(--accent);
    background: color-mix(in srgb, var(--accent) 6%, transparent);
  }
  .quiz-btn.danger:hover { border-color: var(--wrong); color: var(--wrong); background: color-mix(in srgb, var(--wrong) 6%, transparent); }

  /* QUIZ — Type mode (texte) */
  .quiz-type-area {
    margin-bottom: 2rem;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: .85rem;
  }
  .quiz-text-input {
    width: min(420px, 100%);
    background: transparent;
    border: none;
    border-bottom: 2px dashed var(--rule-strong);
    padding: 1rem .5rem .9rem;
    font-family: 'JetBrains Mono', monospace;
    font-size: clamp(1.5rem, 5vw, 2.1rem);
    font-weight: 500;
    color: var(--ink);
    text-align: center;
    outline: none;
    caret-color: var(--accent);
    letter-spacing: .12em;
    transition: border-color .25s ease, color .25s ease;
  }
  .quiz-text-input::placeholder {
    color: var(--ink-faint);
    font-style: italic;
    font-weight: 400;
    letter-spacing: .05em;
    font-size: .85em;
  }
  .quiz-text-input:focus { border-bottom-style: solid; border-bottom-color: var(--accent); }
  .quiz-text-input.is-correct { border-bottom-color: var(--correct); color: var(--correct); }
  .quiz-text-input.is-wrong { border-bottom-color: var(--wrong); color: var(--wrong); animation: shakeBad .35s ease; }
  .quiz-input-hint {
    font-family: 'Fraunces', serif; font-style: italic;
    font-size: .72rem;
    color: var(--ink-muted);
    letter-spacing: .2em;
    text-transform: uppercase;
  }
  .quiz-input-hint kbd {
    margin: 0 .15em;
    font-family: 'JetBrains Mono', monospace;
    font-size: .68rem;
    padding: .12rem .4rem;
    background: var(--surface-2);
    border: 1px solid var(--rule);
    border-radius: 4px;
    color: var(--ink-soft);
    letter-spacing: 0;
    text-transform: none;
  }

  /* QUIZ — Draw mode (pad) */
  .quiz-draw-area {
    margin-bottom: 2rem;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 1rem;
  }
  .quiz-canvas-frame {
    position: relative;
    width: clamp(240px, 70vw, 320px);
    aspect-ratio: 1 / 1;
    border: 1px solid var(--rule);
    border-radius: 16px;
    background: var(--surface-2);
    overflow: hidden;
    box-shadow: inset 0 1px 3px rgba(0,0,0,.08);
  }
  .quiz-canvas-frame::before,
  .quiz-canvas-frame::after {
    content: '';
    position: absolute;
    background: var(--rule);
    pointer-events: none;
    opacity: .55;
  }
  .quiz-canvas-frame::before { left: 50%; top: 8%; bottom: 8%; width: 1px; }
  .quiz-canvas-frame::after  { top: 50%; left: 8%; right: 8%; height: 1px; }
  .quiz-canvas {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    cursor: crosshair;
    touch-action: none;
    display: block;
  }
  .quiz-canvas-ghost {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Noto Serif JP', serif;
    font-weight: 500;
    font-size: clamp(8rem, 24vw, 13rem);
    color: var(--accent);
    opacity: .22;
    pointer-events: none;
    user-select: none;
    animation: ghostIn .35s ease;
  }
  @keyframes ghostIn { from { opacity: 0; transform: scale(.9); } to { opacity: .22; transform: scale(1); } }
  .quiz-draw-controls {
    display: flex;
    gap: .5rem;
    flex-wrap: wrap;
    justify-content: center;
  }
  .quiz-grade {
    display: flex;
    gap: .5rem;
    margin-top: .25rem;
    animation: ghostIn .3s ease;
  }
  .quiz-grade-btn {
    border: 1px solid var(--rule);
    background: var(--surface);
    border-radius: 10px;
    padding: .55rem 1.2rem;
    font-family: 'Fraunces', serif; font-style: italic;
    font-size: .9rem;
    cursor: pointer;
    transition: border-color .2s, color .2s, background .2s, transform .15s;
  }
  .quiz-grade-btn.good { color: var(--correct); }
  .quiz-grade-btn.good:hover {
    border-color: var(--correct);
    background: var(--correct-soft);
    transform: translateY(-1px);
  }
  .quiz-grade-btn.bad { color: var(--wrong); }
  .quiz-grade-btn.bad:hover {
    border-color: var(--wrong);
    background: color-mix(in srgb, var(--wrong) 8%, transparent);
    transform: translateY(-1px);
  }

  .quiz-feedback {
    text-align: center;
    margin-top: 1rem;
    min-height: 1.4rem;
    font-family: 'Fraunces', serif; font-style: italic;
    font-size: .9rem;
    color: var(--ink-muted);
    transition: color .25s;
  }
  .quiz-feedback.is-correct { color: var(--correct); }
  .quiz-feedback.is-wrong   { color: var(--wrong); }
  .quiz-feedback .answer-kana { font-family: 'Noto Serif JP', serif; font-style: normal; margin-left: .3em; }
  .quiz-feedback .answer-mono { font-family: 'JetBrains Mono', monospace; font-style: normal; margin-left: .3em; }

  @media (max-width: 540px) {
    .quiz-stats { grid-template-columns: repeat(2, 1fr); row-gap: 1rem; }
    .quiz-choices { gap: .65rem; }
    .quiz-choice.jp { font-size: 1.9rem; }
    .quiz-choice.mono { font-size: 1.25rem; }
  }

  /* ============================================
     FLYING WORD — collected to vocab
  ============================================ */
  .flying-word {
    position: fixed;
    left: 0; top: 0;
    pointer-events: none;
    z-index: 60;
    font-family: 'Noto Serif JP', serif;
    font-size: 1.7rem;
    font-weight: 500;
    color: var(--accent);
    white-space: nowrap;
    letter-spacing: .04em;
    text-shadow: 0 4px 18px color-mix(in srgb, var(--accent) 35%, transparent);
    will-change: transform, opacity;
    animation: wordFly 1.4s cubic-bezier(.22,1,.36,1) forwards;
    transform-origin: center;
  }
  @keyframes wordFly {
    0% {
      transform: translate(var(--from-x), var(--from-y)) scale(1);
      opacity: 0;
    }
    10% { opacity: 1; }
    28% {
      transform: translate(var(--zoom-x), var(--zoom-y)) scale(2);
      opacity: 1;
    }
    55% {
      transform: translate(var(--zoom-x), var(--zoom-y)) scale(1.6);
      opacity: 1;
    }
    100% {
      transform: translate(var(--to-x), var(--to-y)) scale(.3);
      opacity: 0;
    }
  }

  /* Vocab pill bounce when a word lands */
  .vocab-pill.is-collecting {
    animation: vocabPing .45s cubic-bezier(.22,1,.36,1);
    border-color: var(--accent) !important;
    color: var(--accent) !important;
    background: color-mix(in srgb, var(--accent) 14%, transparent) !important;
  }
  @keyframes vocabPing {
    0%, 100% { transform: scale(1); }
    40%      { transform: scale(1.18); }
  }

  .pill-badge {
    background: var(--accent);
    color: var(--bg);
    font-family: 'JetBrains Mono', monospace;
    font-size: .62rem;
    font-weight: 600;
    padding: .12rem .42rem;
    border-radius: 9px;
    letter-spacing: 0;
    min-width: 1.2em;
    text-align: center;
    line-height: 1.1;
    transition: transform .2s ease;
  }
  [data-theme="paper"] .pill-badge { color: white; }
  .vocab-pill.is-collecting .pill-badge {
    animation: badgePop .45s cubic-bezier(.22,1,.36,1);
  }
  @keyframes badgePop {
    0%, 100% { transform: scale(1); }
    50%      { transform: scale(1.4); }
  }

  /* ============================================
     VOCABULARY VIEW
  ============================================ */
  .vocab-view {
    max-width: 48rem;
    margin: 0 auto;
    padding: clamp(2.5rem, 8vh, 5rem) clamp(1.25rem, 5vw, 3rem) 6rem;
    animation: verseEnter .55s cubic-bezier(.22,1,.36,1) both;
  }
  .vocab-head {
    text-align: center;
    margin-bottom: 3rem;
    padding-bottom: 2rem;
    border-bottom: 1px solid var(--rule);
  }
  .vocab-eyebrow {
    font-family: 'Fraunces', serif; font-style: italic;
    font-size: .72rem; color: var(--ink-muted);
    letter-spacing: .32em; text-transform: uppercase;
    margin: 0 0 1.25rem;
  }
  .vocab-title {
    font-family: 'Noto Serif JP', serif;
    font-size: clamp(2rem, 6vw, 2.85rem);
    font-weight: 500; letter-spacing: .06em;
    color: var(--ink); margin: 0 0 .75rem;
  }
  .vocab-subtitle {
    font-family: 'Fraunces', serif; font-style: italic;
    font-size: 1rem; color: var(--ink-muted);
    margin: 0;
  }
  .vocab-empty {
    text-align: center;
    padding: 3.5rem 1.5rem;
    border: 1px dashed var(--rule);
    border-radius: 16px;
    background: color-mix(in srgb, var(--surface-2) 60%, transparent);
    color: var(--ink-muted);
  }
  .vocab-empty .badge-jp {
    font-family: 'Noto Serif JP', serif;
    font-size: 2.5rem;
    color: var(--ink-faint);
    margin: 0 0 1rem;
    letter-spacing: .08em;
  }
  .vocab-empty p {
    font-family: 'Fraunces', serif; font-style: italic;
    font-size: .95rem; margin: .3rem 0;
  }

  .vocab-section { margin-bottom: 2.75rem; }
  .vocab-section-title {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    gap: 1rem;
    flex-wrap: wrap;
    margin: 0 0 1.5rem;
    padding-bottom: .9rem;
    border-bottom: 1px solid var(--rule);
  }
  .vocab-section-title .left {
    display: flex; align-items: baseline; gap: .9rem; flex-wrap: wrap;
  }
  .vocab-section-title .jp-name {
    font-family: 'Noto Serif JP', serif;
    font-weight: 500;
    font-size: 1.5rem;
    color: var(--ink);
    letter-spacing: .03em;
  }
  .vocab-section-title .fr-name {
    font-family: 'Fraunces', serif; font-style: italic;
    font-size: .9rem;
    color: var(--ink-muted);
  }
  .vocab-section-title .count {
    font-family: 'JetBrains Mono', monospace;
    font-size: .72rem;
    color: var(--ink-faint);
    letter-spacing: .12em;
  }

  .vocab-list {
    display: grid;

/* ========================================================
   HELPERS
======================================================== */
function normalize(s) {
  let r = s.toLowerCase()
    .replace(/[.,。、!?！？\-_'"「」『』（）()]/g, '')
    .replace(/ā/g, 'aa').replace(/ī/g, 'ii').replace(/ū/g, 'uu').replace(/ē/g, 'ee').replace(/ō/g, 'oo');
  r = r.replace(/(^|\s)ha(\s|$)/g, '$1wa$2');
  r = r.replace(/(^|\s)he(\s|$)/g, '$1e$2');
  r = r.replace(/(^|\s)wo(\s|$)/g, '$1o$2');
  r = r.replace(/ou/g, 'oo');
  return r.replace(/\s+/g, '').trim();
}

function toRoman(n) {
  const pairs = [['M',1000],['CM',900],['D',500],['CD',400],['C',100],['XC',90],['L',50],['XL',40],['X',10],['IX',9],['V',5],['IV',4],['I',1]];
  let r = '';
  for (const [s, v] of pairs) { while (n >= v) { r += s; n -= v; } }
  return r;
}

/* ========================================================
   ROMAJI ALIASES — pour le mode écrit
======================================================== */
const ROMAJI_ALIASES = {
  shi: ['shi','si'],
  chi: ['chi','ti'],
  tsu: ['tsu','tu'],
  fu:  ['fu','hu'],
  ji:  ['ji','zi'],
  dji: ['dji','di','ji'],
  dzu: ['dzu','du','zu'],
  sha: ['sha','sya'], shu: ['shu','syu'], sho: ['sho','syo'],
  cha: ['cha','tya'], chu: ['chu','tyu'], cho: ['cho','tyo'],
  ja:  ['ja','jya','zya'], ju: ['ju','jyu','zyu'], jo: ['jo','jyo','zyo'],
  n:   ['n','nn'],
  wo:  ['wo','o'],
};
function romajiVariants(r) { return ROMAJI_ALIASES[r] || [r]; }
function matchRomaji(input, target) {
  const norm = (input || '').trim().toLowerCase().replace(/\s+/g,'');
  if (!norm) return false;
  return romajiVariants(target).includes(norm);
}

/* Convert a kana string to romaji (fallback when not in WORD_DICT) */
const KANA_LOOKUP = (() => {
  const map = {};
  [...KANA_BASIC, ...KANA_DAKUTEN, ...KANA_COMBOS].forEach(k => {
    map[k.h] = k.r;
    map[k.k] = k.r;
  });
  return map;
})();
function kanaToRomaji(s) {
  let out = '';
  let i = 0;
  while (i < s.length) {
    // try 2-char combos (yōon)
    const two = s.substring(i, i + 2);
    if (KANA_LOOKUP[two]) { out += KANA_LOOKUP[two]; i += 2; continue; }
    const one = s.substring(i, i + 1);
    if (KANA_LOOKUP[one]) { out += KANA_LOOKUP[one]; i += 1; continue; }
    // small tsu (gemination)
    if (one === 'っ' || one === 'ッ') {
      const next2 = s.substring(i + 1, i + 3);
      const next1 = s.substring(i + 1, i + 2);
      const r = KANA_LOOKUP[next2] || KANA_LOOKUP[next1];
      if (r) out += r[0];
      i += 1;
      continue;
    }
    // long vowel mark (katakana)
    if (one === 'ー' && out.length) { out += out[out.length - 1]; i += 1; continue; }
    i += 1; // unknown, skip
  }
  // Particle heuristics: は/wo/へ as particles
  return out
    .replace(/wo$/, 'o')
    .replace(/^ha$/, 'wa')
    .replace(/^he$/, 'e');
}

function lookupWord(rawWord) {
  const clean = (rawWord || '').replace(/[、。「」『』！？!?,]/g, '').trim();
  if (!clean) return null;
  const entry = WORD_DICT[clean];
  if (entry) return { kana: clean, r: entry.r, fr: entry.fr, en: entry.en || entry.fr };
  return { kana: clean, r: kanaToRomaji(clean), fr: '—', en: '—' };
}

function loadSettings() {
  try {
    const stored = localStorage.getItem('hira-reader-settings');
    return stored ? { ...DEFAULT_SETTINGS, ...JSON.parse(stored) } : DEFAULT_SETTINGS;
  } catch { return DEFAULT_SETTINGS; }
}

/* ========================================================
   VERSE
======================================================== */
function Verse({ phrase, index, settings, isActive, onComplete, onStatusChange, onFocus, onLearn, registerInput }) {
  const [input, setInput] = useState('');
  const [revealed, setRevealed] = useState(false);
  const [readOpen, setReadOpen] = useState(false);
  const inputRef = useRef(null);
  const verseTextRef = useRef(null);
  const learnedRef = useRef(false);
  const t = useT();
  const lang = useLang();

  const isPractice = settings.mode === 'practice';
  const isInverted = settings.mode === 'inverted';
  const isRead     = settings.mode === 'read';

  const question     = isInverted ? phrase.romaji[0] : phrase.hiragana;
  const answer       = isInverted ? phrase.hiragana   : phrase.romaji[0];
  const expectedList = isInverted ? [phrase.hiragana] : phrase.romaji;

  const norm = normalize(input);
  const isCorrect = input.length > 0 && expectedList.some(e => normalize(e) === norm);
  const isPrefix  = input.length > 0 && expectedList.some(e => normalize(e).startsWith(norm));
  const isWrong   = input.length > 0 && !isCorrect && !isPrefix;

  useEffect(() => { registerInput(index, inputRef); }, [index, registerInput]);

  useEffect(() => {
    onStatusChange(index, isCorrect ? 'correct' : (isWrong ? 'wrong' : null));
    if (isCorrect) {
      setRevealed(false);
      onComplete(index);
      // Fire onLearn once per verse completion
      if (!learnedRef.current && onLearn && !isRead) {
        learnedRef.current = true;
        const rect = verseTextRef.current?.getBoundingClientRect() || null;
        // Slight delay so the annotation has time to appear visually before the launch
        setTimeout(() => onLearn(index, phrase, rect), 120);
      }
    }
  }, [isCorrect, isWrong]);

  // Click in read mode → toggle annotation
  const handleVerseClick = () => { if (isRead) setReadOpen(o => !o); };

  // Render annotation logic
  const showAnnotation =
    (isRead && (readOpen || settings.readAll)) ||
    (!isRead && isCorrect);

  const showFrench =
    !!phrase.french && (
      settings.french === 'always' ||
      (settings.french === 'after' && (isCorrect || (isRead && (readOpen || settings.readAll))))
    );

  return (
    <div
      className={`verse ${isCorrect ? 'complete' : ''} ${isActive && !isRead ? 'active' : ''} ${isRead ? 'readable' : ''}`}
      onClick={handleVerseClick}
    >
      <span className="verse-num">{String(index + 1).padStart(2, '0')}</span>
      <p ref={verseTextRef} className={`verse-text ${isInverted ? 'mono' : ''}`}>{question}</p>

      {!isRead && (
        <div className="verse-input-row" onClick={(e) => e.stopPropagation()}>
          <input
            ref={inputRef}
            type="text"
            value={input}
            onChange={(e) => setInput(e.target.value)}
            onFocus={() => onFocus(index)}
            readOnly={isCorrect}
            placeholder={isInverted
              ? t('tape les hiraganas…', 'type the hiragana…')
              : t('tape le romaji…', 'type the romaji…')}
            className={`prose-input ${isInverted ? 'jp' : ''} ${isWrong ? 'wrong' : ''} ${isCorrect ? 'correct' : ''}`}
            autoComplete="off" spellCheck="false" autoCapitalize="off" autoCorrect="off"
            lang={isInverted ? 'ja' : 'en'}
          />
          {!isCorrect && (
            <button
              type="button"
              className="reveal-link"
              onClick={(e) => { e.stopPropagation(); setRevealed(r => !r); }}
            >{revealed ? t('masquer', 'hide') : t('voir la réponse', 'show answer')}</button>
          )}
          {!isCorrect && revealed && (
            <div className={`revealed-answer ${isInverted ? 'jp' : ''}`}>{answer}</div>
          )}
        </div>
      )}

      {showAnnotation && (
        <div className="verse-annotation">
          {(isRead || isCorrect) && (
            <p className={`annotation-romaji ${isInverted ? 'jp' : ''}`}>{answer}</p>
          )}
          {showFrench && (
            <p className="annotation-french">
              {lang === 'en' && phrase.english ? phrase.english : phrase.french}
            </p>
          )}
        </div>
      )}
    </div>
  );
}

======================================================== */
function ScriptPill({ scriptKey, jp, fr, stories, currentId, isActive, onSelect }) {
  const [open, setOpen] = useState(false);
  const [alignRight, setAlignRight] = useState(false);
  const ref = useRef(null);

  useEffect(() => {
    const handler = (e) => {
      if (ref.current && !ref.current.contains(e.target)) setOpen(false);
    };
    if (open) document.addEventListener('mousedown', handler);
    return () => document.removeEventListener('mousedown', handler);
  }, [open]);

  // Close on Esc
  useEffect(() => {
    if (!open) return;
    const handler = (e) => { if (e.key === 'Escape') setOpen(false); };
    document.addEventListener('keydown', handler);
    return () => document.removeEventListener('keydown', handler);
  }, [open]);

  // Detect overflow and flip alignment if needed
  useEffect(() => {
    if (!open || !ref.current) return;
    const rect = ref.current.getBoundingClientRect();
    const estimatedWidth = 320;
    const overflowsRight = rect.left + estimatedWidth > window.innerWidth - 12;
    setAlignRight(overflowsRight);
  }, [open]);

  const list = stories.filter(s => s.script === scriptKey);
  const lang = useLang();

  return (
    <div className="pill-wrap" ref={ref}>
      <button
        className={`nav-pill-btn ${isActive ? 'active' : ''} ${open ? 'open' : ''}`}
        onClick={() => setOpen(o => !o)}
        aria-expanded={open}
        aria-haspopup="menu"
      >
        <span className="pill-jp">{jp}</span>
        <span className="pill-fr">{fr}</span>
        <span className="caret">▾</span>
      </button>
      {open && (
        <div className={`chapter-menu ${alignRight ? 'align-right' : ''}`} role="menu">
          <div className="menu-section">
            <div className="menu-section-label">
              <span>{fr}</span>
              <span className="ml-jp">{jp}</span>
            </div>
            {list.map((s, i) => (
              <button
                key={s.id} role="menuitem"
                className={`menu-item ${s.id === currentId && isActive ? 'active' : ''}`}
                onClick={() => { onSelect(s.id); setOpen(false); }}
              >
                <span className="num">{toRoman(i + 1)}</span>
                <span className="titles">
                  <span>{s.title.jp}</span>
                  <span className="fr">{lang === 'en' && s.title.en ? s.title.en : s.title.fr}</span>
                </span>
              </button>
            ))}
          </div>
        </div>
      )}
    </div>
  );
}

function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }
function shuffle(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function DrawPad({ onClearRef }) {
  const canvasRef = useRef(null);
  const drawing = useRef(false);
  const last = useRef({ x: 0, y: 0 });

  // Configure context once
  useEffect(() => {
    const c = canvasRef.current;
    if (!c) return;
    // Resize for sharpness
    const resize = () => {
      const rect = c.getBoundingClientRect();
      const dpr = window.devicePixelRatio || 1;
      c.width  = rect.width  * dpr;
      c.height = rect.height * dpr;
      const ctx = c.getContext('2d');
      ctx.scale(dpr, dpr);
      const ink = getComputedStyle(document.body).getPropertyValue('--ink').trim() || '#222';
      ctx.strokeStyle = ink;
      ctx.lineWidth = 7;
      ctx.lineCap = 'round';
      ctx.lineJoin = 'round';
    };
    resize();
    window.addEventListener('resize', resize);
    return () => window.removeEventListener('resize', resize);
  }, []);

  const clear = useCallback(() => {
    const c = canvasRef.current;
    if (!c) return;
    const ctx = c.getContext('2d');
    ctx.save();
    ctx.setTransform(1, 0, 0, 1, 0, 0);
    ctx.clearRect(0, 0, c.width, c.height);
    ctx.restore();
  }, []);

  // Expose clear method to parent
  useEffect(() => {
    if (onClearRef) onClearRef.current = clear;
  }, [clear, onClearRef]);

  const getPos = (e) => {
    const c = canvasRef.current;
    const rect = c.getBoundingClientRect();
    const t = e.touches && e.touches[0] ? e.touches[0] : e;
    return { x: t.clientX - rect.left, y: t.clientY - rect.top };
  };

  const start = (e) => {
    e.preventDefault();
    drawing.current = true;
    last.current = getPos(e);
  };
  const move = (e) => {
    if (!drawing.current) return;
    e.preventDefault();
    const pos = getPos(e);
    const ctx = canvasRef.current.getContext('2d');
    ctx.beginPath();
    ctx.moveTo(last.current.x, last.current.y);
    ctx.lineTo(pos.x, pos.y);
    ctx.stroke();
    last.current = pos;
  };
  const end = () => { drawing.current = false; };

  return (
    <canvas
      ref={canvasRef}
      className="quiz-canvas"
      onMouseDown={start}
      onMouseMove={move}
      onMouseUp={end}
      onMouseLeave={end}
      onTouchStart={start}
      onTouchMove={move}
      onTouchEnd={end}
    />
  );
}

function Quiz({ settings }) {
  const [score, setScore] = useState({ correct: 0, wrong: 0, streak: 0, best: 0 });
  const [question, setQuestion] = useState(null);
  const [choices, setChoices] = useState([]);
  const [feedback, setFeedback] = useState(null); // null | { type, selectedRomaji? }
  const [round, setRound] = useState(0);
  const t = useT();
  const lang = useLang();

  // Write-mode state
  const [typed, setTyped] = useState('');
  const [revealed, setRevealed] = useState(false);
  const clearCanvasRef = useRef(null);
  const typedInputRef = useRef(null);

  const pool = useMemo(() => {
    const sets = settings.quizSets || ['basic'];
    let arr = [];
    if (sets.includes('basic'))   arr = arr.concat(KANA_BASIC);
    if (sets.includes('dakuten')) arr = arr.concat(KANA_DAKUTEN);
    if (sets.includes('combos'))  arr = arr.concat(KANA_COMBOS);
    return arr.length ? arr : KANA_BASIC;
  }, [settings.quizSets]);

  const generateQuestion = useCallback(() => {
    const correct = pick(pool);

    let dir = settings.quizDirection;
    if (dir === 'random') dir = Math.random() < 0.5 ? 'kana-to-romaji' : 'romaji-to-kana';

    let script = settings.quizScripts;
    if (script === 'both') script = Math.random() < 0.5 ? 'hiragana' : 'katakana';

    // Build 3 distinct distractors (by romaji)
    const used = new Set([correct.r]);
    const distractors = [];
    let safety = 0;
    while (distractors.length < 3 && safety < 200) {
      safety++;
      const cand = pick(pool);
      if (used.has(cand.r)) continue;
      used.add(cand.r);
      distractors.push(cand);
    }
    const all = shuffle([correct, ...distractors]);

    setQuestion({ kana: correct, direction: dir, script });
    setChoices(all);
    setFeedback(null);
    setTyped('');
    setRevealed(false);
    if (clearCanvasRef.current) clearCanvasRef.current();
  }, [pool, settings.quizDirection, settings.quizScripts]);

  // Regenerate when settings or round change
  useEffect(() => { generateQuestion(); }, [generateQuestion, round]);

  // Reset round when major settings change
  useEffect(() => { setRound(r => r + 1); }, [settings.quizDirection, settings.quizScripts, settings.quizSets, settings.quizInput]);

  // Auto-focus the text input when applicable
  useEffect(() => {
    if (!question) return;
    if (settings.quizInput === 'write' && question.direction === 'kana-to-romaji') {
      setTimeout(() => typedInputRef.current?.focus(), 50);
    }
  }, [question, settings.quizInput]);

  const markCorrect = (selected) => {
    setFeedback({ type: 'correct', selectedRomaji: selected });
    setScore(s => {
      const ns = s.streak + 1;
      return { ...s, correct: s.correct + 1, streak: ns, best: Math.max(s.best, ns) };
    });
    setTimeout(() => setRound(r => r + 1), 650);
  };
  const markWrong = (selected, delay = 1500) => {
    setFeedback({ type: 'wrong', selectedRomaji: selected });
    setScore(s => ({ ...s, wrong: s.wrong + 1, streak: 0 }));
    setTimeout(() => setRound(r => r + 1), delay);
  };

  // QCM handler
  const handleAnswer = (choice) => {
    if (feedback) return;
    if (choice.r === question.kana.r) markCorrect(choice.r);
    else markWrong(choice.r);
  };

  // Typed romaji: live match
  const handleTypedChange = (e) => {
    if (feedback) return;
    const v = e.target.value;
    setTyped(v);
    if (matchRomaji(v, question.kana.r)) {
      markCorrect(v);
    }
  };
  const handleTypedKey = (e) => {
    if (e.key === 'Enter') {
      e.preventDefault();
      if (feedback) { setRound(r => r + 1); return; }
      if (matchRomaji(typed, question.kana.r)) {
        markCorrect(typed);
      } else if (typed.trim().length > 0) {
        markWrong(typed, 1700);
      }
    }
  };

  // Drawing: self-grade after reveal
  const handleReveal = () => { if (!feedback) setRevealed(true); };
  const handleSelfGrade = (kind) => {
    if (feedback) return;
    if (kind === 'good') markCorrect(question.kana.r);
    else markWrong('', 900);
  };

  const handleReset = () => {
    setScore({ correct: 0, wrong: 0, streak: 0, best: 0 });
    setRound(r => r + 1);
  };

  // Keyboard shortcuts (only in QCM mode, and only when no input is focused)
  useEffect(() => {
    if (settings.quizInput !== 'choice') return;
    const handler = (e) => {
      if (e.target && (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA')) return;
      const k = e.key;
      if (k >= '1' && k <= '4') {
        const idx = parseInt(k, 10) - 1;
        if (choices[idx]) handleAnswer(choices[idx]);
      } else if (k === ' ' || k === 'Enter') {
        if (feedback) { e.preventDefault(); setRound(r => r + 1); }
      }
    };
    window.addEventListener('keydown', handler);
    return () => window.removeEventListener('keydown', handler);
  }, [choices, feedback, settings.quizInput]);

  if (!question) return null;

  const promptIsKana = question.direction === 'kana-to-romaji';
  const promptDisplay = promptIsKana
    ? (question.script === 'hiragana' ? question.kana.h : question.kana.k)
    : question.kana.r;

  const targetKana = question.script === 'hiragana' ? question.kana.h : question.kana.k;

  const directionLabel = promptIsKana
    ? (question.script === 'hiragana' ? <>Hiragana <span className="arrow">→</span> Romaji</> : <>Katakana <span className="arrow">→</span> Romaji</>)
    : <>Romaji <span className="arrow">→</span> {question.script === 'hiragana' ? 'Hiragana' : 'Katakana'}</>;

  const total = score.correct + score.wrong;
  const accuracy = total > 0 ? Math.round((score.correct / total) * 100) : 0;

  const isWrite = settings.quizInput === 'write';
  const useType = isWrite && promptIsKana;
  const useDraw = isWrite && !promptIsKana;
  const useChoice = !isWrite;

  const qText = useChoice
    ? (promptIsKana
        ? t('Quel est son romaji ?', 'What is its romaji?')
        : t('Quel kana correspond ?', 'Which kana matches?'))
    : (promptIsKana
        ? t('Quel est son romaji ?', 'What is its romaji?')
        : t('Dessine le kana correspondant', 'Draw the matching kana'));

  return (
    <div className="quiz-stage" key={round}>
      <p className="quiz-eyebrow">クイズ · {isWrite ? t('mode écrit', 'write mode') : t('mode aléatoire', 'random mode')}</p>
      <h1 className="quiz-title">Quiz Kana</h1>
      <p className="quiz-subtitle">
        {isWrite
          ? t('Tape le romaji, dessine le kana — auto-correction.', 'Type the romaji, draw the kana — auto-grading.')
          : t('Reconnaissance aléatoire — hiragana, katakana, dans les deux sens.', 'Random recognition — hiragana, katakana, both directions.')}
      </p>

      <div className="quiz-card">
        <div className="quiz-direction">{directionLabel}</div>
        <div className={`quiz-prompt ${promptIsKana ? 'jp' : 'mono'}`}>{promptDisplay}</div>
        <p className="quiz-question">{qText}</p>
      </div>

      {useChoice && (
        <div className="quiz-choices">
          {choices.map((c, i) => {
            const label = promptIsKana
              ? c.r
              : (question.script === 'hiragana' ? c.h : c.k);
            const isCorrect = c.r === question.kana.r;
            const isSelected = feedback && feedback.selectedRomaji === c.r;
            const showCorrect = feedback && isCorrect;
            const showWrong   = feedback && feedback.type === 'wrong' && isSelected;
            const showFaded   = feedback && !isCorrect && !isSelected;
            return (
              <button
                key={`${round}-${i}`}
                className={`quiz-choice ${promptIsKana ? 'mono' : 'jp'} ${showCorrect ? 'correct' : ''} ${showWrong ? 'wrong' : ''} ${showFaded ? 'faded' : ''}`}
                onClick={() => handleAnswer(c)}
                disabled={!!feedback}
              >
                <span className="choice-key">{i + 1}</span>
                {label}
              </button>
            );
          })}
        </div>
      )}

      {useType && (
        <div className="quiz-type-area">
          <input
            ref={typedInputRef}
            type="text"
            value={typed}
            onChange={handleTypedChange}
            onKeyDown={handleTypedKey}
            disabled={!!feedback}
            placeholder={t('tape le romaji…', 'type the romaji…')}
            autoComplete="off" autoCorrect="off" autoCapitalize="off" spellCheck="false"
            className={`quiz-text-input ${feedback?.type === 'correct' ? 'is-correct' : ''} ${feedback?.type === 'wrong' ? 'is-wrong' : ''}`}
          />
          <div className="quiz-input-hint">
            <kbd>{t('Entrée', 'Enter')}</kbd> {t('pour valider · auto-validation si juste', 'to submit · auto-validates when correct')}
          </div>
        </div>
      )}

      {useDraw && (
        <div className="quiz-draw-area">
          <div className="quiz-canvas-frame">
            <DrawPad onClearRef={clearCanvasRef} />
            {(revealed || feedback) && (
              <div className="quiz-canvas-ghost">{targetKana}</div>
            )}
          </div>
          <div className="quiz-draw-controls">
            <button className="quiz-btn" onClick={() => clearCanvasRef.current && clearCanvasRef.current()} disabled={!!feedback}>{t('Effacer', 'Clear')}</button>
            {!revealed && !feedback && (
              <button className="quiz-btn" onClick={handleReveal}>{t('Voir la réponse', 'Show answer')}</button>
            )}
          </div>
          {revealed && !feedback && (
            <div className="quiz-grade">
              <button className="quiz-grade-btn good" onClick={() => handleSelfGrade('good')}>{t('Juste ✓', 'Right ✓')}</button>
              <button className="quiz-grade-btn bad" onClick={() => handleSelfGrade('bad')}>{t('À revoir ✗', 'Retry ✗')}</button>
            </div>
          )}
        </div>
      )}

      <div className={`quiz-feedback ${feedback ? `is-${feedback.type}` : ''}`}>
        {feedback?.type === 'correct' && t('✓ Bonne réponse', '✓ Correct')}
        {feedback?.type === 'wrong' && (
          <>
            {t('✗ La bonne réponse était', '✗ The right answer was')}
            {promptIsKana
              ? <span className="answer-mono">{question.kana.r}</span>
              : <span className="answer-kana">{targetKana}</span>}
          </>
        )}
        {!feedback && <>&nbsp;</>}
      </div>

      <div className="quiz-stats">
        <div className="stat">
          <span className="stat-value is-correct">{score.correct}</span>
          <span className="stat-label">{t('Justes', 'Right')}</span>
        </div>
        <div className="stat">
          <span className="stat-value is-wrong">{score.wrong}</span>
          <span className="stat-label">{t('Erreurs', 'Wrong')}</span>
        </div>
        <div className="stat">
          <span className="stat-value is-streak">{score.streak}</span>
          <span className="stat-label">{t('Série', 'Streak')}</span>
        </div>
        <div className="stat">
          <span className="stat-value">{accuracy}<span style={{ fontSize: '.75em', color: 'var(--ink-muted)' }}>%</span></span>
          <span className="stat-label">{t('Précision', 'Accuracy')}</span>
        </div>
      </div>

      <div className="quiz-controls">
        <button className="quiz-btn" onClick={() => setRound(r => r + 1)}>{t('Passer →', 'Skip →')}</button>
        <button className="quiz-btn danger" onClick={handleReset}>{t('Réinitialiser le score', 'Reset score')}</button>
      </div>
    </div>
  );
