/* ========================================================
   FLASHCARDS — flippable cards from vocab
======================================================== */
function FlashcardsView({ vocab, stories, onSetStatus }) {
  const t = useT();
  const lang = useLang();
  const [filter, setFilter] = useState('all');
  const [shuffled, setShuffled] = useState(false);
  const [index, setIndex] = useState(0);
  const [flipped, setFlipped] = useState(false);
  const [orderSeed, setOrderSeed] = useState(0);

  // Filtered deck (no order yet)
  const deck = useMemo(() => {
    if (filter === 'all') return vocab;
    return vocab.filter(v => v.chapterId === filter);
  }, [vocab, filter]);

  // Ordered sequence — shuffled or natural
  const order = useMemo(() => {
    const seq = deck.map((_, i) => i);
    if (!shuffled) return seq;
    for (let i = seq.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [seq[i], seq[j]] = [seq[j], seq[i]];
    }
    return seq;
  }, [deck, shuffled, orderSeed]);

  // Reset position when filter or order changes
  useEffect(() => { setIndex(0); setFlipped(false); }, [filter, shuffled, orderSeed]);

  const total = deck.length;
  const current = total ? deck[order[index]] : null;
  const currentChapter = current ? stories.find(s => s.id === current.chapterId) : null;

  const next = useCallback(() => {
    setFlipped(false);
    setIndex(i => Math.min(total - 1, i + 1));
  }, [total]);
  const prev = useCallback(() => {
    setFlipped(false);
    setIndex(i => Math.max(0, i - 1));
  }, []);
  const flip = useCallback(() => setFlipped(f => !f), []);

  useEffect(() => {
    const handler = (e) => {
      const tag = (e.target && e.target.tagName) || '';
      if (tag === 'INPUT' || tag === 'TEXTAREA') return;
      if (e.key === ' ' || e.key === 'Enter') { e.preventDefault(); flip(); }
      else if (e.key === 'ArrowRight') { e.preventDefault(); next(); }
      else if (e.key === 'ArrowLeft')  { e.preventDefault(); prev(); }
    };
    window.addEventListener('keydown', handler);
    return () => window.removeEventListener('keydown', handler);
  }, [flip, next, prev]);

  // Chapters that have at least one word
  const chapters = useMemo(() => {
    const ids = new Set(vocab.map(v => v.chapterId));
    return stories.filter(s => ids.has(s.id));
  }, [vocab, stories]);

  if (!current) {
    return (
      <div className="vocab-empty">
        <p className="badge-jp">空</p>
        <p>{t('Aucun mot pour ce filtre.', 'No words match this filter.')}</p>
      </div>
    );
  }

  return (
    <div className="flashcards">
      <div className="flashcard-filters">
        <button
          className={`filter-chip ${filter === 'all' ? 'active' : ''}`}
          onClick={() => setFilter('all')}
        >{t('Tous', 'All')} <span className="chip-count">{vocab.length}</span></button>
        {chapters.map(c => {
          const count = vocab.filter(v => v.chapterId === c.id).length;
          return (
            <button
              key={c.id}
              className={`filter-chip ${filter === c.id ? 'active' : ''}`}
              onClick={() => setFilter(c.id)}
            >{c.title.jp} <span className="chip-count">{count}</span></button>
          );
        })}
      </div>

      <div className="flashcard-stage">
        <div
          className={`flashcard ${flipped ? 'flipped' : ''}`}
          onClick={flip}
          role="button"
          tabIndex={0}
        >
          <div className="flashcard-face front">
            {currentChapter && <div className="card-chapter">{currentChapter.title.jp}</div>}
            <p className="card-kana">{current.kana}</p>
            <p className="card-hint">{t('Cliquer pour retourner', 'Click to flip')}</p>
          </div>
          <div className="flashcard-face back">
            {currentChapter && <div className="card-chapter">{currentChapter.title.jp}</div>}
            <p className="card-romaji">{current.romaji}</p>
            <p className="card-translation">
              {lang === 'en' && current.english ? current.english : current.french}
            </p>
          </div>
        </div>
      </div>

      <div className="flashcard-status-bar">
        <div className="status-toggle" role="radiogroup" aria-label={t('Statut', 'Status')}>
          <button
            className={`status-btn is-learning ${current.status !== 'known' ? 'active' : ''}`}
            onClick={(e) => { e.stopPropagation(); onSetStatus && onSetStatus(current.id, 'learning'); }}
            role="radio" aria-checked={current.status !== 'known'}
          >
            <span className="dot" /> {t('Apprentissage', 'Learning')}
          </button>
          <button
            className={`status-btn is-known ${current.status === 'known' ? 'active' : ''}`}
            onClick={(e) => { e.stopPropagation(); onSetStatus && onSetStatus(current.id, 'known'); }}
            role="radio" aria-checked={current.status === 'known'}
          >
            <span className="check">✓</span> {t('Acquis', 'Known')}
          </button>
        </div>
      </div>

      <div className="flashcard-controls">
        <div className="flashcard-nav">
          <button onClick={prev} disabled={index === 0} aria-label={t('Précédent', 'Previous')}>←</button>
          <button onClick={next} disabled={index === total - 1} aria-label={t('Suivant', 'Next')}>→</button>
        </div>
        <div className="flashcard-counter">{index + 1} / {total}</div>
        <button
          className={`flashcard-shuffle ${shuffled ? 'active' : ''}`}
          onClick={() => { setShuffled(s => !s); setOrderSeed(n => n + 1); }}
        >{shuffled ? t('Mélangé', 'Shuffled') : t('Mélanger', 'Shuffle')}</button>
      </div>

      <div className="flashcard-hint-bar">
        <kbd>Space</kbd> {t('retourner', 'flip')} · <kbd>←</kbd> <kbd>→</kbd> {t('naviguer', 'navigate')}
      </div>
    </div>
  );
}

/* ========================================================
   VOCABULARY VIEW
======================================================== */
function VocabularyView({ vocab, stories, onRemove, onSetStatus, onClear, onGoTo }) {
  const t = useT();
  const lang = useLang();
  const [vocabMode, setVocabMode] = useState('list'); // 'list' | 'cards'
  // Group by chapter (preserve story order), then sort by learnedAt
  const grouped = useMemo(() => {
    const map = new Map();
    stories.forEach(s => {
      const items = vocab.filter(v => v.chapterId === s.id);
      if (items.length) {
        map.set(s.id, {
          story: s,
          items: items.slice().sort((a, b) => (a.learnedAt || 0) - (b.learnedAt || 0)),
        });
      }
    });
    const knownIds = new Set(stories.map(s => s.id));
    const orphans = vocab.filter(v => !knownIds.has(v.chapterId));
    if (orphans.length) map.set('__orphan__', { story: null, items: orphans });
    return [...map.entries()];
  }, [vocab, stories]);

  return (
    <main className="vocab-view">
      <header className="vocab-head">
        <p className="vocab-eyebrow">{t('carnet de vocabulaire', 'vocabulary notebook')}</p>
        <h1 className="vocab-title">単語帳</h1>
        <p className="vocab-subtitle">
          {vocab.length > 0
            ? (lang === 'en'
                ? <>{vocab.length} word{vocab.length > 1 ? 's' : ''} learned — each chunk is split and translated.</>
                : <>{vocab.length} mot{vocab.length > 1 ? 's' : ''} appris — chaque chunk est isolé et traduit.</>)
            : t('Termine des phrases pour remplir ce carnet, mot par mot.',
                'Finish sentences to fill this notebook, word by word.')}
        </p>
      </header>

      {vocab.length === 0 ? (
        <div className="vocab-empty">
          <p className="badge-jp">空</p>
          <p>{t("Aucun mot collecté pour l'instant.", 'No words collected yet.')}</p>
          <p>{t('Tape correctement une phrase dans un chapitre pour voir les mots voler ici.', 'Type a sentence correctly in any chapter to see the words fly here.')}</p>
        </div>
      ) : (
        <>
          <div className="vocab-mode-toggle-wrap">
            <div className="vocab-mode-toggle" role="tablist">
              <button
                className={`vocab-mode-btn ${vocabMode === 'list' ? 'active' : ''}`}
                onClick={() => setVocabMode('list')}
                role="tab" aria-selected={vocabMode === 'list'}
              >{t('Liste', 'List')}</button>
              <button
                className={`vocab-mode-btn ${vocabMode === 'cards' ? 'active' : ''}`}
                onClick={() => setVocabMode('cards')}
                role="tab" aria-selected={vocabMode === 'cards'}
              >{t('Cartes', 'Flashcards')}</button>
            </div>
          </div>

          {vocabMode === 'cards' ? (
            <FlashcardsView vocab={vocab} stories={stories} onSetStatus={onSetStatus} />
          ) : (
            <>
          {grouped.map(([chapterId, group]) => (
            <section className="vocab-section" key={chapterId}>
              <h2 className="vocab-section-title">
                <span className="left">
                  <span className="jp-name">{group.story?.title.jp || t('Anciens', 'Legacy')}</span>
                  <span className="fr-name">{group.story
                    ? (lang === 'en' && group.story.title.en ? group.story.title.en : group.story.title.fr)
                    : ''}</span>
                </span>
                <span className="count">
                  {lang === 'en'
                    ? <>{group.items.length} word{group.items.length > 1 ? 's' : ''}</>
                    : <>{group.items.length} mot{group.items.length > 1 ? 's' : ''}</>}
                </span>
              </h2>
              <div className="vocab-list vocab-list-grid">
                {group.items.map(item => {
                  const known = item.status === 'known';
                  return (
                    <div className={`vocab-card word-card ${known ? 'is-known' : ''}`} key={item.id}>
                      <button
                        className={`word-status-toggle ${known ? 'is-known' : ''}`}
                        onClick={() => onSetStatus && onSetStatus(item.id, known ? 'learning' : 'known')}
                        aria-label={known
                          ? t('Marquer comme à apprendre', 'Mark as learning')
                          : t('Marquer comme acquis', 'Mark as known')}
                        title={known
                          ? t('Acquis · clique pour remettre en apprentissage', 'Known · click to mark as learning')
                          : t('En apprentissage · clique pour marquer acquis', 'Learning · click to mark as known')}
                      >{known ? '✓' : ''}</button>
                      <button
                        className="vocab-remove"
                        onClick={() => onRemove(item.id)}
                        aria-label={t('Retirer du carnet', 'Remove from notebook')}
                      >✕</button>
                      <p className="word-kana">{item.kana}</p>
                      <p className="word-romaji">{item.romaji}</p>
                      <p className="word-fr">{lang === 'en' && item.english ? item.english : item.french}</p>
                    </div>
                  );
                })}
              </div>
            </section>
          ))}

          <div className="vocab-controls">
            <button className="vocab-clear" onClick={onClear}>{t('Vider le carnet', 'Clear notebook')}</button>
          </div>
            </>
          )}
        </>
      )}
    </main>
  );
}

/* ========================================================
   APP
======================================================== */
function loadVocab() {
  try {
    const stored = localStorage.getItem('hira-reader-vocab-v2');
    return stored ? JSON.parse(stored) : [];
  } catch { return []; }
}

function App() {
  const [view, setView] = useState('story'); // 'story' | 'quiz' | 'vocabulary'
  const [storyId, setStoryId] = useState(stories[0].id);
  const [settings, setSettings] = useState(loadSettings);
  const [settingsOpen, setSettingsOpen] = useState(false);
  const [statuses, setStatuses] = useState({});
  const [activeIndex, setActiveIndex] = useState(0);
  const [resetKey, setResetKey] = useState(0);
  const [vocab, setVocab] = useState(loadVocab);
  const [flights, setFlights] = useState([]);
  const [collecting, setCollecting] = useState(false);
  const inputRefs = useRef({});
  const collectingTimeoutRef = useRef(null);

  const isQuiz  = view === 'quiz';
  const isVocab = view === 'vocabulary';
  const isStory = view === 'story';
  const story = stories.find(s => s.id === storyId);
  const scriptStories = stories.filter(s => s.script === story.script);
  const scriptIdx = scriptStories.findIndex(s => s.id === storyId);
  const total = story.phrases.length;
  const correctCount = Object.values(statuses).filter(s => s === 'correct').length;
  const progress = isStory ? (total ? (correctCount / total) * 100 : 0) : 0;
  const isComplete = correctCount === total;

  /* Persist settings */
  useEffect(() => {
    try { localStorage.setItem('hira-reader-settings', JSON.stringify(settings)); } catch {}
  }, [settings]);

  /* Persist vocab */
  useEffect(() => {
    try { localStorage.setItem('hira-reader-vocab-v2', JSON.stringify(vocab)); } catch {}
  }, [vocab]);

  /* Apply theme to body */
  useEffect(() => {
    document.body.setAttribute('data-theme', settings.theme);
  }, [settings.theme]);

  /* Reset when story or mode changes */
  const fullReset = useCallback(() => {
    setStatuses({});
    setActiveIndex(0);
    setResetKey(k => k + 1);
    inputRefs.current = {};
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }, []);

  const handleStoryChange = (id) => { setView('story'); setStoryId(id); fullReset(); };
  const handleSelectQuiz  = () => { setView('quiz'); window.scrollTo({ top: 0, behavior: 'smooth' }); };
  const handleSelectVocab = () => { setView('vocabulary'); window.scrollTo({ top: 0, behavior: 'smooth' }); };
  useEffect(() => { fullReset(); /* on mode change */ }, [settings.mode, fullReset]);

  /* ===== Vocabulary collection + flying words ===== */
  const handleLearn = useCallback((phraseIndex, phrase, anchorRect) => {
    // Split phrase into raw chunks (used both for flying & dict lookup)
    const rawWords = phrase.hiragana
      .replace(/[、。「」『』！？!?,]/g, ' ')
      .split(/\s+/)
      .map(w => w.trim())
      .filter(Boolean);

    const entries = rawWords.map(lookupWord).filter(Boolean);

    // Add each unique word to vocab (dedupe by kana globally)
    setVocab(prev => {
      const existing = new Set(prev.map(v => v.kana));
      const fresh = [];
      for (const e of entries) {
        if (existing.has(e.kana)) continue;
        existing.add(e.kana);
        fresh.push({
          id: 'w-' + e.kana,
          kana: e.kana,
          romaji: e.r,
          french: e.fr,
          english: e.en,
          chapterId: storyId,
          fromPhraseIndex: phraseIndex,
          learnedAt: Date.now(),
        });
      }
      return fresh.length ? [...prev, ...fresh] : prev;
    });

    // Locate vocab pill for flight target
    const vocabBtn = document.querySelector('.vocab-pill');
    const target = vocabBtn?.getBoundingClientRect() || {
      left: window.innerWidth - 60, top: 70, width: 40, height: 40,
    };
    const toX = target.left + target.width / 2 - 20;
    const toY = target.top  + target.height / 2 - 20;

    if (rawWords.length === 0 || !anchorRect) return;

    // Spread the start positions horizontally across the verse text
    const startBaseX = anchorRect.left;
    const startBaseY = anchorRect.top + anchorRect.height / 2 - 20;
    const usableWidth = Math.max(anchorRect.width - 20, 80);
    const step = rawWords.length > 1 ? usableWidth / (rawWords.length - 1) : 0;

    const now = Date.now();
    const newFlights = rawWords.map((word, i) => ({
      id: `f-${now}-${i}-${Math.random().toString(36).slice(2,6)}`,
      word,
      fromX: startBaseX + step * i,
      fromY: startBaseY,
      toX, toY,
      delay: i * 200,
    }));

    setFlights(prev => [...prev, ...newFlights]);

    // Trigger vocab pill collecting state slightly after the first lands
    const totalDuration = (rawWords.length - 1) * 200 + 1400;
    if (collectingTimeoutRef.current) clearTimeout(collectingTimeoutRef.current);
    setTimeout(() => setCollecting(true), Math.max(0, totalDuration - 600));
    collectingTimeoutRef.current = setTimeout(() => setCollecting(false), totalDuration);
  }, [storyId]);

  const removeFlight = useCallback((id) => {
    setFlights(prev => prev.filter(f => f.id !== id));
  }, []);

  const handleRemoveVocab = useCallback((id) => {
    setVocab(prev => prev.filter(v => v.id !== id));
  }, []);

  const handleSetVocabStatus = useCallback((id, status) => {
    setVocab(prev => prev.map(v => v.id === id ? { ...v, status } : v));
  }, []);

  const handleClearVocab = useCallback(() => {
    const msg = (settings.lang === 'en')
      ? 'Clear the whole vocabulary notebook?'
      : 'Vider tout le carnet de vocabulaire ?';
    if (window.confirm(msg)) setVocab([]);
  }, [settings.lang]);

  /* Status & completion handling */
  const handleStatus = useCallback((i, status) => {
    setStatuses(prev => (prev[i] === status ? prev : { ...prev, [i]: status }));
  }, []);

  const handleComplete = useCallback((i) => {
    if (!settings.autoFocus) return;
    // Find next unanswered
    const next = i + 1;
    if (next < total) {
      setTimeout(() => {
        setActiveIndex(next);
        const ref = inputRefs.current[next];
        if (ref && ref.current) {
          ref.current.focus();
          ref.current.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }
      }, 350);
    }
  }, [settings.autoFocus, total]);

  const handleVerseFocus = useCallback((i) => setActiveIndex(i), []);

  const registerInput = useCallback((i, ref) => {
    inputRefs.current[i] = ref;
  }, []);

  /* Chapter navigation helpers — stays within the same script */
  const prevStory = scriptIdx > 0 ? scriptStories[scriptIdx - 1] : null;
  const nextStory = scriptIdx < scriptStories.length - 1 ? scriptStories[scriptIdx + 1] : null;

  const handleResetSettings = () => { setSettings(DEFAULT_SETTINGS); fullReset(); };

  const mastheadTitle =
    isQuiz  ? 'クイズ' :
    isVocab ? '単語帳' :
              (story.script === 'katakana' ? 'カタカナ' : 'ひらがな');
  const mastheadEyebrow =
    isQuiz  ? 'exercice aléatoire' :
    isVocab ? 'carnet personnel' :
              'cahier de lecture';
  const mastheadSubtitle =
    isQuiz  ? 'Quiz — reconnaissance kana ↔ romaji' :
    isVocab ? 'Vocabulaire — phrases collectées' :
              ((story.script === 'katakana' ? 'Katakana' : 'Hiragana') + " — un petit livre pour s'entraîner");

  const lang = settings.lang || 'fr';
  const setLang = (v) => setSettings(prev => ({ ...prev, lang: v }));

  const scriptLabel =
    isQuiz  ? 'クイズ' :
    isVocab ? '単語帳' :
              (story.script === 'katakana' ? 'カタカナ' : 'ひらがな');
  const scriptLabelLat =
    isQuiz  ? (lang === 'en' ? 'Quiz' : 'Quiz') :
    isVocab ? (lang === 'en' ? 'Vocabulary' : 'Vocabulaire') :
              (story.script === 'katakana' ? 'Katakana' : 'Hiragana');

  const mastheadEyebrowI18n =
    isQuiz  ? (lang === 'en' ? 'random exercise'    : 'exercice aléatoire') :
    isVocab ? (lang === 'en' ? 'personal notebook'  : 'carnet personnel') :
              (lang === 'en' ? 'reading notebook'   : 'cahier de lecture');
  const mastheadSubtitleI18n =
    isQuiz  ? (lang === 'en' ? 'Quiz — kana ↔ romaji recognition'
                              : 'Quiz — reconnaissance kana ↔ romaji') :
    isVocab ? (lang === 'en' ? 'Vocabulary — collected words'
                              : 'Vocabulaire — mots collectés') :
              (scriptLabelLat + (lang === 'en' ? ' — a little book to practice'
                                                : " — un petit livre pour s'entraîner"));

  return (
    <LangContext.Provider value={lang}>
      <div className="progress-track" aria-hidden="true">
        <div className="progress-fill" style={{ width: `${progress}%` }} />
      </div>

      <header className="masthead">
        <p className="masthead-eyebrow">{mastheadEyebrowI18n}</p>
        <h1 className="masthead-title">{scriptLabel}</h1>
        <div className="masthead-rule" aria-hidden="true" />
        <p className="masthead-subtitle">{mastheadSubtitleI18n}</p>
        {isStory && (
          <p className="masthead-meta">
            {lang === 'en'
              ? <>Volume {toRoman(scriptIdx + 1)} · {scriptStories.length} chapters</>
              : <>Volume {toRoman(scriptIdx + 1)} · {scriptStories.length} chapitres</>}
          </p>
        )}
        {isVocab && vocab.length > 0 && (
          <p className="masthead-meta">
            {lang === 'en'
              ? <>{vocab.length} word{vocab.length > 1 ? 's' : ''} learned</>
              : <>{vocab.length} mot{vocab.length > 1 ? 's' : ''} appris</>}
          </p>
        )}
      </header>

      <nav className="toolstrip">
        <NavBar
          stories={stories}
          currentId={storyId}
          view={view}
          vocabCount={vocab.length}
          collecting={collecting}
          onSelect={handleStoryChange}
          onSelectQuiz={handleSelectQuiz}
          onSelectVocab={handleSelectVocab}
        />
        <div className="toolstrip-right">
          <LangSwitcher lang={lang} onChange={setLang} />
          <button className="icon-btn" onClick={() => setSettingsOpen(true)} aria-label={lang === 'en' ? 'Settings' : 'Paramètres'}>
            <IconSettings/>
          </button>
        </div>
      </nav>

      {isQuiz && <Quiz settings={settings} />}

      {isVocab && (
        <VocabularyView
          vocab={vocab}
          stories={stories}
          onRemove={handleRemoveVocab}
          onSetStatus={handleSetVocabStatus}
          onClear={handleClearVocab}
          onGoTo={handleStoryChange}
        />
      )}

      {isStory && (
        <main
          key={`${storyId}-${settings.mode}-${resetKey}`}
          className="reader"
          data-size={settings.fontSize}
          data-spacing={settings.spacing}
        >
          <header className="chapter-head">
            <div className="chapter-eyebrow">
              {lang === 'en' ? 'Chapter' : 'Chapitre'} {toRoman(scriptIdx + 1)} · {story.script === 'katakana' ? 'カタカナ' : 'ひらがな'}
            </div>
            <h1 className="chapter-title">{story.title.jp}</h1>
            <p className="chapter-subtitle">{lang === 'en' && story.title.en ? story.title.en : story.title.fr}</p>
          </header>

          <section className="verses">
            {story.phrases.map((p, i) => (
              <Verse
                key={i}
                phrase={p}
                index={i}
                settings={settings}
                isActive={i === activeIndex}
                onComplete={handleComplete}
                onStatusChange={handleStatus}
                onFocus={handleVerseFocus}
                onLearn={handleLearn}
                registerInput={registerInput}
              />
            ))}
          </section>

          {isComplete && settings.mode !== 'read' && (
            <div className="celebration">
              <p className="badge jp">よくできました</p>
              <p className="sub">{lang === 'en' ? 'Chapter complete.' : 'Chapitre terminé.'}</p>
            </div>
          )}

          <footer className="chapter-foot">
            <div className="ornament">* * *</div>
            <div className="end-label">
              {settings.mode === 'read'
                ? (lang === 'en' ? 'End of reading' : 'Fin de la lecture')
                : (lang === 'en' ? 'End of chapter' : 'Fin du chapitre')}
            </div>
            <div className="chapter-nav">
              <div className="nav-cell left">
                {prevStory && (
                  <button className="nav-pill prev" onClick={() => handleStoryChange(prevStory.id)}>
                    <span className="nav-arrow">←</span>
                    <span className="nav-text">
                      <span className="nav-label">{lang === 'en' ? 'Previous' : 'Précédent'}</span>
                      <span className="nav-title">{prevStory.title.jp}</span>
                    </span>
                  </button>
                )}
              </div>
              <div className="nav-cell right">
                {nextStory && (
                  <button className="nav-pill next" onClick={() => handleStoryChange(nextStory.id)}>
                    <span className="nav-text right">
                      <span className="nav-label">{lang === 'en' ? 'Next' : 'Suivant'}</span>
                      <span className="nav-title">{nextStory.title.jp}</span>
                    </span>
                    <span className="nav-arrow">→</span>
                  </button>
                )}
              </div>
            </div>
          </footer>
        </main>
      )}

      <SettingsPanel
        open={settingsOpen}
        onClose={() => setSettingsOpen(false)}
        settings={settings}
        onChange={setSettings}
        onReset={fullReset}
        view={view}
      />

      {/* Flying words overlay */}
      {flights.map(f => (
        <FlyingWord
          key={f.id}
          word={f.word}
          fromX={f.fromX} fromY={f.fromY}
          toX={f.toX} toY={f.toY}
          delay={f.delay}
          onDone={() => removeFlight(f.id)}
        />
      ))}
    </LangContext.Provider>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
